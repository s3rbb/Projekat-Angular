<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Prijava</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline">
          <mat-label>Korisnicko ime</mat-label>
          <input matInput [(ngModel)]="username" name="username" required>
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Lozinka</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required>
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="!username || !password">
          <mat-icon>login</mat-icon> Prijavi se
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <p>Nemate nalog? <a routerLink="/register">Registrujte se</a></p>
    </mat-card-actions>
  </mat-card>
</div>
